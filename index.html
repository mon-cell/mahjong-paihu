<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>麻雀牌譜プレイヤー</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede8;--sf:#fff;--sf2:#f1efe8;
  --bd:rgba(0,0,0,.12);--bd2:rgba(0,0,0,.22);
  --tx:#1a1a18;--tx2:#5f5e5a;--tx3:#888780;
  --b-bg:#e6f1fb;--b:#185fa5;--b-t:#0c447c;
  --a-bg:#faeeda;--a:#ba7517;--a-t:#633806;
  --g-bg:#eaf3de;--g:#3b6d11;
  --r-bg:#fcebeb;--r:#a32d2d;
  --tl-bg:#e1f5ee;--tl:#0f6e56;
  --ra:8px;--ral:12px
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--sf:#252523;--sf2:#2c2c2a;
  --bd:rgba(255,255,255,.1);--bd2:rgba(255,255,255,.2);
  --tx:#f0ede8;--tx2:#b4b2a9;--tx3:#888780;
  --b-bg:#0c447c;--b:#85b7eb;--b-t:#b5d4f4;
  --a-bg:#633806;--a:#ef9f27;--a-t:#fac775;
  --g-bg:#27500a;--g:#97c459;
  --r-bg:#791f1f;--r:#f09595;
  --tl-bg:#085041;--tl:#5dcaa5;
}}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:16px 12px 60px}
h1{font-size:20px;font-weight:500;margin-bottom:4px}
.sub{font-size:13px;color:var(--tx3);margin-bottom:16px}
.card{background:var(--sf);border:.5px solid var(--bd);border-radius:var(--ral);padding:16px;margin-bottom:12px}
.slabel{font-size:11px;color:var(--tx3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
button{background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--ra);padding:7px 14px;font-size:14px;color:var(--tx);cursor:pointer;transition:background .1s,transform .08s;-webkit-tap-highlight-color:transparent}
button:hover{background:var(--sf2)}button:active{transform:scale(.95)}
button:disabled{opacity:.4;cursor:default;transform:none}
button.pri{background:var(--b);border-color:var(--b);color:#e6f1fb}button.pri:hover{opacity:.88}
button.grn{background:var(--g);border-color:var(--g);color:#eaf3de}button.grn:hover{opacity:.88}
button.back-btn{font-size:13px;color:var(--tx3);padding:5px 12px;margin-bottom:10px}
button.rbtn{width:100%;padding:11px;font-size:15px;margin-top:10px}
textarea{width:100%;background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--ra);padding:7px 9px;font-size:14px;color:var(--tx);resize:none;font-family:inherit;outline:none}
textarea:focus{box-shadow:0 0 0 2px var(--b)}
input[type=text],input[type=number]{background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--ra);padding:6px 9px;font-size:14px;color:var(--tx);outline:none;width:100%}
input[type=text]:focus,input[type=number]:focus{box-shadow:0 0 0 2px var(--b)}
select{background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--ra);padding:6px 9px;font-size:14px;color:var(--tx);outline:none;width:100%;-webkit-appearance:none}
select:focus{box-shadow:0 0 0 2px var(--b)}
.st{font-size:13px;padding:9px 13px;border-radius:var(--ra);margin-top:8px;display:none}
.st.info{display:block;background:var(--b-bg);color:var(--b-t)}
.st.ok{display:block;background:var(--g-bg);color:var(--g)}
.st.warn{display:block;background:var(--a-bg);color:var(--a-t)}
.st.err{display:block;background:var(--r-bg);color:var(--r)}
.pdots{display:flex;gap:6px}
.pdot{width:9px;height:9px;border-radius:50%;background:var(--bd2)}
.pdot.done{background:var(--g)}.pdot.active{background:var(--b)}
.pic{border:2px solid var(--b);border-radius:var(--ral);padding:14px;margin-bottom:10px}
.pi-name{font-size:15px;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.wbadge{font-size:12px;padding:2px 9px;border-radius:20px;background:var(--b-bg);color:var(--b-t)}
.hprev{font-size:20px;min-height:24px;margin-top:6px;word-break:break-all;letter-spacing:1px;line-height:1.4;white-space:nowrap;overflow-x:auto}
/* 確認サマリー */
.rsum{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.rsc{padding:9px 11px;border-radius:var(--ra);border:.5px solid var(--bd);background:var(--sf);cursor:pointer;transition:background .12s}
.rsc:hover{background:var(--sf2)}
.rsc-head{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:13px;font-weight:500}
.edit-hint{font-size:11px;color:var(--b);margin-left:auto}

/* ── 牌キーボード（シンプル版） ── */
.kbd-wrap{margin-top:8px;background:var(--sf2);border-radius:var(--ra);padding:10px}
.kbd-tabs{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.kbd-tab{font-size:12px;padding:4px 10px;border-radius:20px;border:.5px solid var(--bd2);background:var(--sf);color:var(--tx2);cursor:pointer}
.kbd-tab.on{background:var(--b);border-color:var(--b);color:#e6f1fb}
.kbd-row{display:flex;gap:3px;flex-wrap:wrap}
.tile-btn{font-size:22px;line-height:1;padding:4px 5px;min-width:40px;border-radius:6px;border:.5px solid var(--bd2);background:var(--sf);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .08s,transform .08s}
.tile-btn:active{transform:scale(.88);background:var(--b-bg)}
.util-row{display:flex;gap:4px;margin-top:6px;padding-top:6px;border-top:.5px solid var(--bd)}
.util-btn{font-size:13px;padding:5px 12px;border-radius:6px;border:.5px solid var(--bd2);background:var(--sf);cursor:pointer;-webkit-tap-highlight-color:transparent}
.util-btn.del{color:var(--r)}
.util-btn.spc{color:var(--tx3)}

/* 終局入力 */
.final-block{background:var(--sf2);border-radius:var(--ra);padding:12px;margin-bottom:10px}
.final-block h3{font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.flabel{font-size:12px;color:var(--tx3);display:block;margin-top:8px;margin-bottom:3px}
.flabel:first-of-type{margin-top:0}
.ta-sm{height:44px;font-size:13px}
/* 特殊ボタン */
.sp-btn{font-size:13px;padding:5px 10px;border-radius:6px;border:.5px solid var(--bd2);background:var(--sf);cursor:pointer;white-space:nowrap}
.sp-btn.pon{background:#fbeaf0;border-color:#d4537e;color:#72243e}
.sp-btn.chi{background:var(--tl-bg);border-color:var(--tl);color:var(--tl)}
.sp-btn.kan{background:var(--a-bg);border-color:var(--a);color:var(--a-t)}
.sp-btn.del{color:var(--r)}
.score-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.score-btn{font-size:12px;padding:4px 8px;border-radius:6px;border:.5px solid var(--bd2);background:var(--sf2);cursor:pointer;color:var(--tx2);white-space:nowrap}
.score-btn:active{background:var(--a-bg)}
/* 結果選択 */
.res-sel-grid{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.res-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.res-row label{font-size:13px;color:var(--tx2);min-width:80px;flex-shrink:0}
.res-row select{max-width:200px;flex:1}
/* ドラプレビュー */
.dora-prev{font-size:26px;min-height:32px;margin-top:4px;letter-spacing:1px}

/* ── 再生 ── */
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px}
.mc{background:var(--sf2);border-radius:var(--ra);padding:9px 11px}
.mc .lbl{font-size:11px;color:var(--tx3);margin-bottom:2px}
.mc .val{font-size:17px;font-weight:500}
.slider-wrap{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.slider-wrap input[type=range]{flex:1;height:6px;cursor:pointer;accent-color:var(--b)}
.slider-lbl{font-size:13px;color:var(--tx3);min-width:56px;text-align:right}
.thdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.badge{font-size:12px;font-weight:500;padding:3px 12px;border-radius:20px}
.badge.init,.badge.ryukyoku{background:var(--sf2);color:var(--tx3)}
.badge.dahai{background:var(--a-bg);color:var(--a-t)}
.badge.agari{background:var(--g-bg);color:var(--g)}
.player-col{display:flex;flex-direction:column;gap:10px}
.prow{background:var(--sf);border:.5px solid var(--bd);border-radius:var(--ral);overflow:hidden}
.prow.act{border:2px solid var(--b)}.prow.win{border:2px solid var(--g)}.prow.ron-loser{border:2px solid var(--r)}
.prow-hdr{padding:7px 14px;background:var(--sf2);border-bottom:.5px solid var(--bd);display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--tx2)}
.prow-hdr .dot{width:7px;height:7px;border-radius:50%;background:var(--tx3);flex-shrink:0}
.prow-hdr .dot.act{background:var(--b)}.prow-hdr .dot.win{background:var(--g)}
.act-label{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--b-bg);color:var(--b-t)}
.naki-label{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--tl-bg);color:var(--tl)}
.prow-body{padding:10px 14px;display:grid;grid-template-columns:1fr 2fr 1fr;gap:14px;align-items:start}
/* ツモ+捨てペア表示 */
.tsumo-disc-col{display:flex;flex-direction:column;gap:0;}
.tsumo-row{display:flex;gap:0;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;min-height:24px;}
.tsumo-row::-webkit-scrollbar{height:2px;}
.tsumo-row::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:1px;}
.td-pair{display:inline-flex;flex-direction:column;align-items:center;margin-right:1px;}
.td-tsumo{font-size:20px;line-height:1.3;}
.td-disc{font-size:20px;line-height:1.3;}
.td-disc.naki{background:var(--r-bg);border-radius:3px;color:var(--r);}
.td-disc.last-act{background:var(--a-bg);border-radius:3px;}
.td-disc.tsumo-cut{opacity:.55;}
.td-arrow{font-size:11px;color:var(--tx3);line-height:1;margin:-1px 0;}
@media(max-width:700px){
  .prow-body{grid-template-columns:1fr;gap:6px}
  .mgrid{grid-template-columns:repeat(2,1fr)}
  .ctrl button{padding:10px 14px;font-size:16px}
  .tile-btn{min-width:36px;font-size:20px}
  .final-block{padding:10px}
  .res-row{flex-direction:column;align-items:flex-start}
  .res-row label{min-width:unset}
  .res-row select{max-width:100%}
}
.section-title{font-size:10px;color:var(--tx3);margin-bottom:3px;letter-spacing:.04em;text-transform:uppercase}
.tiles-line{font-size:22px;line-height:1.35;white-space:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.tiles-line::-webkit-scrollbar{height:2px}
.tiles-line::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:1px}
.tiles-line.dim{opacity:.28}
.hl-a{display:inline-block;background:var(--a-bg);border-radius:3px}
.tunk{font-size:12px;color:var(--tx3);font-style:italic}
.meld-group{display:inline-block;padding:0 3px;margin-right:4px;font-size:20px}
.disc-block{font-size:20px;line-height:1.5;word-break:break-all}
.disc-row{min-height:26px;white-space:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
.disc-row::-webkit-scrollbar{height:2px}
.disc-row::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:1px}
.ctrl{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.sinfo{font-size:13px;color:var(--tx3);margin-left:auto}
.pbar{width:100%;height:4px;background:var(--sf2);border-radius:2px;margin-top:8px;overflow:hidden}
.pfill{height:100%;background:var(--b);border-radius:2px;transition:width .2s}
.srow{display:flex;align-items:center;gap:8px;margin-top:6px}
.srow label{font-size:12px;color:var(--tx3)}
.elog{max-height:180px;overflow-y:auto;border:.5px solid var(--bd);border-radius:var(--ra);padding:6px 11px}
.li{font-size:12px;padding:3px 0;border-bottom:.5px solid var(--bd);color:var(--tx2);display:flex;gap:8px;cursor:pointer}
.li:last-child{border-bottom:none}
.li .lt{color:var(--tx3);min-width:26px;flex-shrink:0}
.li.cur{color:var(--tx);font-weight:500}.li:hover{color:var(--tx)}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;margin-right:4px;margin-bottom:4px}
.tag.am{background:var(--a-bg);color:var(--a-t)}.tag.gr{background:var(--g-bg);color:var(--g)}
#ph-input{display:none}#ph-final{display:none}#ph-player{display:none}
/* フローティング再生コントロール（上部固定） */
#float-ctrl{
  display:none;position:fixed;top:0;left:0;right:0;z-index:100;
  background:var(--sf);border-bottom:1px solid var(--bd2);
  padding:6px 10px 7px;
  box-shadow:0 2px 12px rgba(0,0,0,.12);
}
#float-ctrl .fc-row1{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
#float-ctrl .fc-row2{display:flex;align-items:center;gap:6px;}
#float-ctrl input[type=range]{flex:1;accent-color:var(--b);}
#float-ctrl .fc-lbl{font-size:11px;color:var(--tx3);white-space:nowrap;}
#float-ctrl .fc-desc{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#float-ctrl button{padding:6px 11px;font-size:16px;}
#float-ctrl #fc-play{font-size:13px;padding:6px 14px;background:var(--b);border-color:var(--b);color:#e6f1fb;}
/* 再生中は上部パディングを追加 */
body.playing-mode .wrap{padding-top:76px;padding-bottom:20px;}

/* フローティング山残り牌 */
#float-yama{
  display:none;position:fixed;bottom:0;right:0;z-index:200;
  width:min(340px,100vw);
  background:var(--sf);border:1px solid var(--bd2);
  border-radius:12px 12px 0 0;
  box-shadow:-2px -4px 20px rgba(0,0,0,.18);
  transition:transform .22s cubic-bezier(.4,0,.2,1);
}
#float-yama.collapsed{transform:translateY(calc(100% - 38px));}
#float-yama-header{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;cursor:pointer;
  border-bottom:1px solid var(--bd);
  user-select:none;-webkit-user-select:none;
}
#float-yama-header .fy-title{font-size:12px;font-weight:600;flex:1;color:var(--tx2);}
#float-yama-header .fy-step{font-size:11px;color:var(--tx3);}
#float-yama-header .fy-toggle{font-size:14px;color:var(--tx3);transition:transform .2s;}
#float-yama.collapsed #float-yama-header .fy-toggle{transform:rotate(180deg);}
#float-yama-body{padding:8px 10px 10px;overflow-x:auto;}

/* 山残りパネル呼び出しボタン（再生画面に表示） */
#btn-yama-float{
  display:none;position:fixed;bottom:72px;right:14px;z-index:150;
  background:var(--sf);border:1.5px solid var(--bd2);border-radius:50%;
  width:44px;height:44px;font-size:18px;
  box-shadow:0 2px 10px rgba(0,0,0,.18);
  cursor:pointer;align-items:center;justify-content:center;
  padding:0;-webkit-tap-highlight-color:transparent;
}
@media print{
  body>*{display:none!important}
  #print-frame{display:block!important;position:static!important;inset:auto!important;width:100%!important;background:#fff!important;z-index:auto!important;padding:0!important;overflow:visible!important;}
  #print-frame #report-inner{
    padding:6mm 8mm!important;
    max-width:100%!important;
    font-size:9pt!important;
  }
  /* A4 1ページ収まるよう各要素を縮小 */
  #print-frame h2{font-size:11pt!important;margin-bottom:2mm!important;}
  #print-frame [style*="font-size:19px"]{font-size:12pt!important;margin-bottom:2mm!important;}
  #print-frame [style*="font-size:13px;font-weight:600"]{font-size:9pt!important;margin-bottom:1mm!important;}
  #print-frame [style*="margin-bottom:8px"]{margin-bottom:2mm!important;}
  #print-frame [style*="margin-bottom:5px"]{margin-bottom:1.5mm!important;}
  #print-frame [style*="padding:6px 10px"]{padding:3px 6px!important;}
  @page{size:A4 portrait;margin:8mm;}
}
</style>
</head>
<body>
<div class="wrap">
<h1>🀄︎ 麻雀牌譜プレイヤー</h1>
<p class="sub">① 初期手牌入力 → ② 終局データ入力 → ③ 牌譜再生</p>
<div id="restore-banner" style="display:none;margin-bottom:12px;"></div>

<!-- ① 初期手牌 -->
<div id="ph-input">
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div>
        <div class="slabel" style="margin-bottom:2px;">① 初期手牌を入力（配牌時の13枚）</div>
        <div style="font-size:14px;color:var(--tx2);" id="ph-sub"></div>
      </div>
      <div class="pdots" id="ph-dots"></div>
    </div>
    <div id="input-area"></div>
  </div>
  <div class="card" id="ready-card" style="display:none;">
    <div class="slabel">全員の初期手牌が揃いました（タップで修正）</div>
    <div id="rsum"></div>
    <div id="rsum-warn" class="st"></div>
    <button class="pri rbtn" onclick="goFinal()">② 終局データの入力へ →</button>
  </div>
</div>

<!-- ② 終局データ -->
<div id="ph-final">
  <button class="back-btn" onclick="backToInput()">← ① 初期手牌入力に戻る</button>

  <!-- 局情報 -->
  <div class="card">
    <div class="slabel">局情報</div>
    <div style="margin-bottom:10px;">
      <label style="font-size:13px;color:var(--tx2);display:block;margin-bottom:3px;">タイトル（任意）</label>
      <input type="text" id="m-title" placeholder="例: 2025年4月 東1局">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;">
      <label style="font-size:13px;color:var(--tx2);">場風
        <select id="m-bk" style="display:block;margin-top:3px;"><option>東</option><option>南</option></select>
      </label>
      <label style="font-size:13px;color:var(--tx2);">局
        <select id="m-ky" style="display:block;margin-top:3px;"><option>1</option><option>2</option><option>3</option><option>4</option></select>
      </label>
      <label style="font-size:13px;color:var(--tx2);">本場
        <input type="number" id="m-ho" value="0" min="0" style="display:block;margin-top:3px;">
      </label>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:560px;">
      <div>
        <label style="font-size:13px;color:var(--tx2);display:block;margin-bottom:3px;">ドラ表示牌（スペース区切り最大4種）</label>
        <input type="text" id="m-dora" placeholder="例: 9p 中 2s 5m" oninput="updDoraPrev()" style="width:100%;">
      </div>
      <div>
        <label style="font-size:13px;color:var(--tx2);display:block;margin-bottom:3px;">裏ドラ表示牌（リーチ和了時）</label>
        <input type="text" id="m-ura-dora" placeholder="例: 3m E" oninput="updDoraPrev()" style="width:100%;">
      </div>
    </div>
    <div class="dora-prev" id="dora-prev" style="margin-top:6px;"></div>
  </div>

  <!-- 結果 -->
  <div class="card">
    <div class="slabel">対局結果</div>
    <div class="res-sel-grid">
      <div class="res-row">
        <label>和了者</label>
        <select id="res-winner" onchange="onWinnerChange()">
          <option value="ryukyoku">流局</option>
          <option value="east">東家</option>
          <option value="south">南家</option>
          <option value="west">西家</option>
          <option value="north">北家</option>
        </select>
      </div>
      <div class="res-row" id="row-wintype" style="display:none;">
        <label>アガリ方</label>
        <select id="res-wintype" onchange="onWintypeChange()">
          <option value="tsumo">ツモ</option>
          <option value="ron">ロン</option>
        </select>
      </div>
      <div class="res-row" id="row-loser" style="display:none;">
        <label>振込者</label>
        <select id="res-loser">
          <option value="">選択してください</option>
        </select>
      </div>
      <div class="res-row" id="row-score" style="display:none;">
        <label>点数</label>
        <div style="flex:1;">

<script>
const TE={
  "東":"🀀","南":"🀁","西":"🀂","北":"🀃","中":"🀄\uFE0E","発":"🀅","白":"🀆",
  "1m":"🀇","2m":"🀈","3m":"🀉","4m":"🀊","5m":"🀋","6m":"🀌","7m":"🀍","8m":"🀎","9m":"🀏","r5m":"🀋",
  "1p":"🀙","2p":"🀚","3p":"🀛","4p":"🀜","5p":"🀝","6p":"🀞","7p":"🀟","8p":"🀠","9p":"🀡","r5p":"🀝",
  "1s":"🀐","2s":"🀑","3s":"🀒","4s":"🀓","5s":"🀔","6s":"🀕","7s":"🀖","8s":"🀗","9s":"🀘","r5s":"🀔","?":"🂠"
};
const WJ={east:"東",south:"南",west:"西",north:"北"};
const WE=["east","south","west","north"];
const SPD=[2000,1400,900,550,250];
const SPDL=["遅い","やや遅い","普通","速い","最速"];
const SCORE_PRESETS=["1000","1300","1500","2000","2600","3200","3900","5200","7700","8000","9600","11600","12000","16000","1300-2600","2000-4000","2600-5200","3200-6400","4000-8000","8000all","4000all","2000all","役満"];
// 牌キーボードタブ
const KBD_TABS=[
  {id:"man",label:"萬子",tiles:["1m","2m","3m","4m","5m","r5m","6m","7m","8m","9m"]},
  {id:"pin",label:"筒子",tiles:["1p","2p","3p","4p","5p","r5p","6p","7p","8p","9p"]},
  {id:"sou",label:"索子",tiles:["1s","2s","3s","4s","5s","r5s","6s","7s","8s","9s"]},
  {id:"ji", label:"字牌",tiles:["東","南","西","北","白","発","中"]}
];

function te(t){
  if(t==="r5m"||t==="r5p"||t==="r5s"){
    return '<span style="position:relative;display:inline-block;line-height:1;">'
      +TE[t]
      +'<span style="position:absolute;top:-1px;right:-2px;font-size:.45em;line-height:1;color:#e53935;text-shadow:0 0 2px #fff;">●</span>'
      +'</span>';
  }
  return TE[t]||t;
}
function th(arr,hlIdx,hlC){
  hlIdx=hlIdx??-1;hlC=hlC||"a";
  if(!arr||!arr.length)return '<span class="tunk">-</span>';
  return arr.map((t,i)=>{
    if(!t||t==="?")return '<span class="tunk">?</span>';
    const e=te(t);
    return i===hlIdx?'<span class="hl-'+hlC+'">'+e+'</span>':e;
  }).join("");
}
function discHTML(disc,hlLast,nakiSet,riichiIdx,nakiInfo){
  if(!disc||!disc.length)return '<span class="tunk" style="font-size:12px;display:block;min-height:22px;">-</span>';
  nakiSet=nakiSet||new Set();
  riichiIdx=(riichiIdx!=null&&!isNaN(riichiIdx))?riichiIdx:-1;
  let html='<div class="disc-block">';
  for(let r=0;r<3;r++){
    const row=disc.slice(r*6,(r+1)*6);
    if(!row.length)break;
    const isLR=(r===Math.floor((disc.length-1)/6));
    const rh=row.map(function(t,i){
      const absIdx=r*6+i;
      if(!t||t==="?")return '<span class="tunk">?</span>';
      const e=te(t);
      const isRiichi=(absIdx===riichiIdx);
      const riichiMark=isRiichi?'<span style="position:absolute;top:-3px;right:-2px;font-size:8px;font-weight:700;color:var(--r);line-height:1;background:#fff;border-radius:2px;padding:0 1px;">R</span>':'';
      if(hlLast&&isLR&&i===row.length-1)return '<span class="hl-a">'+e+'</span>'+riichiMark;
      if(nakiSet.has(absIdx)){
        var nkInfo=(nakiInfo&&nakiInfo[absIdx])?nakiInfo[absIdx]:null;
        var nkType=nkInfo?nkInfo.type:'';
        var nkRole=nkInfo?nkInfo.role:'naki';
        // role='naki': 他家に鳴かれた牌 → P/C/K バッジ（赤/緑/橙）
        // role='after': 副露後に自分が捨てた牌 → 小文字 p/c/k バッジ（薄色）
        var nkLabel=nkRole==='after'
          ?(nkType==='pon'?'P↓':nkType==='chi'?'C↓':'K↓')
          :(nkType==='pon'?'P':nkType==='chi'?'C':nkType==='kan'?'K':'鳴');
        var nkColor=nkRole==='after'
          ?(nkType==='pon'?'#a32d2d':nkType==='chi'?'#0f6e56':'#ba7517')
          :(nkType==='pon'?'#a32d2d':nkType==='chi'?'#0f6e56':'#ba7517');
        return '<span style="position:relative;display:inline-block;">'
          +e
          +'<span style="position:absolute;top:-2px;right:-3px;font-size:8px;font-weight:700;color:'+nkColor+';line-height:1;background:#fff;border-radius:2px;padding:0 1px;white-space:nowrap;">'+nkLabel+'</span>'
          +'</span>'+riichiMark;
      }
      if(isRiichi)return '<span style="position:relative;display:inline-block;vertical-align:bottom;">'+e+riichiMark+'</span>';
      return e;
    }).join("");
    html+='<div class="disc-row">'+rh+'</div>';
  }
  return html+"</div>";
}
function meldHTML(melds){
  if(!melds||!melds.length)return "";
  return melds.map(function(m){
    const lbl={pon:"ポン",chi:"チー",kan:"カン",ankan:"暗カン"}[m.type]||m.type;
    // カン牌列
    const tilesPart=(m.tiles||[]).map(te).join("");
    // 嶺上牌: 矢印の後に ^ マーク付きで表示
    const rinshanPart=m.rinshanTile
      ?'<span style="font-size:13px;opacity:.7;margin:0 1px;">→</span>'
        +'<span style="position:relative;display:inline-block;vertical-align:bottom;">'
        +te(m.rinshanTile)
        +'<span style="position:absolute;top:-3px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:#0f6e56;line-height:1;">^</span>'
        +'</span>'
      :'';
    // 捨て牌
    const discPart=m.discTile
      ?'<span style="font-size:13px;opacity:.7;margin:0 1px;">→</span>'+te(m.discTile)
      :'';
    // カンドラ表示牌
    const kanDoraPart=m.kanDoraTile
      ?'<span style="font-size:11px;color:var(--tx3);margin-left:5px;white-space:nowrap;">'
        +'カンドラ表示:'+te(m.kanDoraTile)
        +'<span style="font-size:10px;color:var(--tx3);">→'+te(doraFromIndicator(m.kanDoraTile))+'</span>'
        +'</span>'
      :'';
    return '<span class="meld-group" title="'+lbl+'">'
      +tilesPart+rinshanPart+discPart
      +'</span>'+kanDoraPart;
  }).join(" ");
}
function dc(o){return JSON.parse(JSON.stringify(o))}

// ドラ表示牌から実際のドラに変換
function doraFromIndicator(indicator){
  if(!indicator)return null;
  var nm=indicator.match(/^(\d)([mps])$/);
  if(nm){var n=parseInt(nm[1]);return (n===9?1:n+1)+nm[2];}
  var rm=indicator.match(/^r5([mps])$/);
  if(rm){return '6'+rm[1];}
  var jiOrder=['東','南','西','北'];
  var jiIdx=jiOrder.indexOf(indicator);
  if(jiIdx>=0)return jiOrder[(jiIdx+1)%4];
  var sankiOrder=['白','発','中'];
  var sankiIdx=sankiOrder.indexOf(indicator);
  if(sankiIdx>=0)return sankiOrder[(sankiIdx+1)%3];
  return indicator;
}

// ─── パーサー ───
const ALPHA_MAP={e:"東",s:"南",w:"西",n:"北",h:"白",f:"発",c:"中"};
function parseTiles(s){
  if(!s)return[];
  s=s.replace(/[　,、，]+/g," ").replace(/\s+/g," ").trim();
  // スペースなし混在対応: アルファベット字牌と数字牌の境界でトークン分割
  // 例: "eee5p" → "e e e 5p", "456p789s" → "456p 789s"
  s=s.replace(/([eswhnfc])(?=[eswhnfc0-9東南西北白発中])/gi,"$1 ")
     .replace(/([mps])(?=[0-9eswhnfc東南西北白発中])/gi,"$1 ")
     .replace(/\s+/g," ").trim();
  const tokens=s.split(" ").filter(Boolean);
  const result=[];
  for(const tok of tokens){
    if(/^[eswhnfc]$/i.test(tok)){result.push(ALPHA_MAP[tok.toLowerCase()]);continue;}
    if(/^[eswhnfc]{2,}$/i.test(tok)){for(const c of tok.toLowerCase())result.push(ALPHA_MAP[c]);continue;}
    if(/^[東南西北白発中]$/.test(tok)){result.push(tok);continue;}
    if(/^[東南西北白発中]{2,}$/.test(tok)){for(const c of tok)result.push(c);continue;}
    if(/^r5[mps]$/i.test(tok)){result.push(tok.toLowerCase());continue;}
    if(/^\d[mps]$/i.test(tok)){result.push(tok.toLowerCase());continue;}
    const m=tok.match(/^(\d+)([mps])$/i);
    if(m){for(const d of m[1])result.push(d+m[2].toLowerCase());continue;}
    result.push(tok);
  }
  return result;
}

// 牌をマンズ→ピンズ→ソーズ→字牌、数字昇順にソート
const TILE_ORDER=(function(){
  const o={};
  // 数牌: m=0-8, p=9-17, s=18-26 (r5xは5xと同じ順位+0.5)
  ["m","p","s"].forEach(function(suit,si){
    for(let n=1;n<=9;n++) o[n+suit]=si*9+(n-1);
    o["r5"+suit]=si*9+4.5;
  });
  // 字牌: 東南西北白発中
  ["東","南","西","北","白","発","中"].forEach(function(t,i){o[t]=27+i;});
  return o;
})();
function sortTiles(tiles){
  return tiles.slice().sort(function(a,b){
    const oa=TILE_ORDER[a]??99, ob=TILE_ORDER[b]??99;
    return oa-ob;
  });
}
function parseMelds(s){
  if(!s)return[];
  const result=[];
  s.replace(/[　,、，]+/g," ").trim().split(/\s+/).filter(Boolean).forEach(function(tok){
    // トークン形式: type:tiles[@nakiIdx|@ankan][>rinshan][>discard]
    // 例: pon:発@1>3p  chi:5p6p7p@0>8p  kan:中@0>4s>7m  kan:北@ankan>2p>5s
    const parts=tok.split(">");
    const base=parts[0];
    const rinshanTile=(parts.length>=2&&(base.includes("kan")))?parts[1]:null;
    const discTile=parts.length>=3?parts[2]:(parts.length===2&&!base.includes("kan")?parts[1]:null);
    const kanDoraTile=(parts.length>=4&&(base.includes("kan")))?parts[3]:null;

    const atM=base.match(/^(.+?)@(\w+)$/);
    const rawForParse=atM?atM[1]:base;
    const nakiAttr=atM?atM[2]:null; // "0","1","2" or "ankan"
    const isAnkan=nakiAttr==="ankan";
    const nakiIdxFixed=(nakiAttr&&!isAnkan)?parseInt(nakiAttr):null;

    const m=rawForParse.match(/^(pon|chi|kan|ankan):(.+)$/i);
    if(!m)return;
    const type=m[1].toLowerCase();
    let tiles=parseTiles(m[2]);
    // 自動展開
    if((type==="ankan"||isAnkan)&&tiles.length===1){tiles=[tiles[0],tiles[0],tiles[0],tiles[0]];}
    else if(type==="pon"&&tiles.length===1&&nakiAttr){tiles=[tiles[0],tiles[0],tiles[0]];}
    else if(type==="kan"&&tiles.length===1&&nakiAttr){tiles=[tiles[0],tiles[0],tiles[0],tiles[0]];}

    // STEP判定
    const needPickShape=(tiles.length===1&&!isAnkan&&nakiAttr===null);
    const needPickFrom=!needPickShape&&nakiAttr===null&&(type==="pon"||type==="kan");
    // kan/ankan: 嶺上牌が未入力
    const needPickRinshan=!needPickShape&&!needPickFrom&&(type==="kan"||isAnkan)&&rinshanTile===null;
    // pon/chi/kan(嶺上確定後): 捨て牌が未入力
    const needPickDisc=!needPickShape&&!needPickFrom&&!needPickRinshan&&discTile===null&&(type==="pon"||type==="chi"||type==="kan"||isAnkan);

    result.push({type:isAnkan?"ankan":type,tiles,
      needPickShape,needPickFrom,needPickRinshan,needPickDisc,
      nakiIdxFixed,isAnkan,rinshanTile,discTile,
      kanDoraTile:(kanDoraTile==="-"?null:kanDoraTile),
      kanDoraSkipped:(kanDoraTile==="-"),
      rawToken:tok});
  });
  return result;
}

// ポンのあり得る3パターン（鳴いた牌の位置）
// 上家(0)・対面(1)・下家(2) → 表示上: [naki, own, own] / [own, naki, own] / [own, own, naki]
function ponOptions(tile){
  const t=tile;
  return [
    {tiles:[t,t,t],nakiIdx:0,from:"上家から"},
    {tiles:[t,t,t],nakiIdx:1,from:"対面から"},
    {tiles:[t,t,t],nakiIdx:2,from:"下家から"},
  ];
}

// カンの選択肢（大明槓3パターン＋暗カン）
function kanOptions(tile){
  const t=tile;
  return [
    {tiles:[t,t,t,t],nakiIdx:0,from:"上家から（大明槓）",attr:"0"},
    {tiles:[t,t,t,t],nakiIdx:1,from:"対面から（大明槓）",attr:"1"},
    {tiles:[t,t,t,t],nakiIdx:2,from:"下家から（大明槓）",attr:"2"},
    {tiles:[t,t,t,t],nakiIdx:-1,from:"暗カン（自分のツモ）",attr:"ankan"},
  ];
}

// チーのあり得る3パターンを返す
// 戻り値: [{tiles:[t0,t1,t2], nakiIdx:0}, ...] nakiIdxが鳴いた牌の位置
function chiOptions(nakiTile){
  const mc=nakiTile.match(/^(\d)([mps])$/i);
  if(!mc)return[];
  const n=parseInt(mc[1]),s=mc[2].toLowerCase();
  const opts=[];
  // パターン1: naki が先頭 → [n, n+1, n+2]
  if(n<=7) opts.push({tiles:[n+s,(n+1)+s,(n+2)+s],nakiIdx:0});
  // パターン2: naki が中間 → [n-1, n, n+1]
  if(n>=2&&n<=8) opts.push({tiles:[(n-1)+s,n+s,(n+1)+s],nakiIdx:1});
  // パターン3: naki が末尾 → [n-2, n-1, n]
  if(n>=3) opts.push({tiles:[(n-2)+s,(n-1)+s,n+s],nakiIdx:2});
  return opts;
}

// 同じ牌が5枚以上チェック（赤ドラを通常牌として扱う）
function normalTile(t){
  if(t==="r5m")return "5m";
  if(t==="r5p")return "5p";
  if(t==="r5s")return "5s";
  return t;
}
function checkTileCount(tiles){
  const cnt={};
  tiles.forEach(function(t){
    const n=normalTile(t);
    cnt[n]=(cnt[n]||0)+1;
  });
  const warn=[];
  Object.entries(cnt).forEach(function([t,c]){if(c>=5)warn.push(te(t)+"が"+c+"枚");});
  return warn;
}

function insertTile(tile){
  if(!kbdTarget)return;
  const ta=document.getElementById(kbdTarget.taId);
  if(!ta)return;
  if(tile===" "){
    const pos=ta.selectionStart,val=ta.value;
    // 末尾や連続スペースを避ける
    if(pos>0&&val[pos-1]!==" "){
      ta.value=val.slice(0,pos)+" "+val.slice(pos);
      ta.selectionStart=ta.selectionEnd=pos+1;
    }
  } else {
    const pos=ta.selectionStart,val=ta.value;
    const needSp=pos>0&&val[pos-1]!==" "&&val[pos-1]!=="\n";
    const ins=(needSp?" ":"")+tile;
    ta.value=val.slice(0,pos)+ins+val.slice(pos);
    ta.selectionStart=ta.selectionEnd=pos+ins.length;
  }
  ta.dispatchEvent(new Event("input"));
  ta.focus();
}

// 末尾の牌1つを削除（スペース含む）
function deleteTile(){
  if(!kbdTarget)return;
  const ta=document.getElementById(kbdTarget.taId);
  if(!ta||!ta.value)return;
  // 末尾のスペースと牌を1トークン分削除
  let v=ta.value.trimEnd();
  const lastSp=v.lastIndexOf(" ");
  ta.value=lastSp>=0?v.slice(0,lastSp+1):"";
  ta.dispatchEvent(new Event("input"));
  ta.focus();
}

function markReady(w){
  initHands[w]=sortTiles(parseTiles(document.getElementById("ta-init-"+w)?.value||""));
  readyFlags[w]=true;
  // 全員Readyならサマリーへ
  if(WE.every(function(x){return readyFlags[x];})){
    renderInput();showReadySummary();return;
  }
  // まだReadyでないプレイヤーが残っていれば次へ
  const ni=WE.indexOf(w)+1;
  if(ni<WE.length&&!readyFlags[WE[ni]]){
    curInputWind=WE[ni];renderInput();window.scrollTo({top:0,behavior:"smooth"});
  } else {
    // 次が既にReadyなら最初のまだReadyでないプレイヤーへ
    const next=WE.find(function(x){return !readyFlags[x];});
    if(next){curInputWind=next;renderInput();window.scrollTo({top:0,behavior:"smooth"});}
    else{renderInput();showReadySummary();}
  }
}

  initHands[w]=parseTiles(document.getElementById("ta-init-"+w)?.value||"");
  readyFlags[w]=false;
  const pi=WE.indexOf(w)-1;
  if(pi<0)return;
  const prev=WE[pi];
  readyFlags[prev]=false;
  curInputWind=prev;
  renderInput();window.scrollTo({top:0,behavior:"smooth"});

function advancePhase(w,phase){

function updFP(type,w){

  // ツモ欄: 入力牌をそのまま順番に表示（↓自動検出はレポート・再生側で処理）
  if(type==="tsumo"){

  }

// ツモ欄の↓から捨て牌を自動補完
function syncDiscFromTsumo(w){
  const tsumoTA=document.getElementById("fd-tsumo-"+w);
  const discTA=document.getElementById("fd-disc-"+w);
  if(!tsumoTA||!discTA)return;
  const tsumoTokens=tsumoTA.value.replace(/[　,、，]+/g," ").replace(/\s+/g," ").trim().split(" ").filter(Boolean);
  // ↓トークンがなければ何もしない
  if(!tsumoTokens.includes("↓"))return;
  // 捨て牌欄の現在値を取得
  const discTokens=discTA.value.replace(/[　,、，]+/g," ").replace(/\s+/g," ").trim().split(" ").filter(Boolean);
  // ツモトークンと捨て牌トークンを同期: ↓の位置は前のツモ牌と同じ値にする
  const newDisc=[];
  var discIdx=0;
  for(var i=0;i<tsumoTokens.length;i++){
    if(tsumoTokens[i]==="↓"){
      // ツモ切り: 直前のツモ牌を捨て牌に追加
      var prevTsumo=null;
      for(var j=i-1;j>=0;j--){
        if(tsumoTokens[j]!=="↓"){prevTsumo=tsumoTokens[j];break;}
      }
      if(prevTsumo)newDisc.push(prevTsumo);
      else if(discIdx<discTokens.length)newDisc.push(discTokens[discIdx++]);
      else newDisc.push("?");
    } else {
      // 通常ツモ: 対応する捨て牌を取得（既存の捨て牌を使う）
      if(discIdx<discTokens.length)newDisc.push(discTokens[discIdx++]);
      // ↓以降の捨て牌がなければ追加しない（ユーザーが後から入力する）
    }
  }
  if(newDisc.length>0){
    const newVal=newDisc.join(" ");
    if(discTA.value.trim()!==newVal){
      discTA.value=newVal;
      updFP("disc",w);
      updRiichiPicker(w);
    }
  }
}

function autoFillTsumo(w){

  // すでにユーザーが手動で何か書いていたら上書きしない（空か?のみなら上書きOK）
  const existing=ta.value.trim();
  const result=estimateTsumo(w);
  if(!result)return;

  // 既存が空、または全て?ならば自動入力

// ツモ牌推測: 初期手牌+ツモ牌 = 最終手牌+捨て牌+副露に消えた牌(鳴いた他家牌を除く)
function estimateTsumo(w){
  const init=initHands[w]||[];
  const finalH=sortTiles(parseTiles(document.getElementById("fd-hand-"+w)?.value||""));
  const disc=parseTiles(document.getElementById("fd-disc-"+w)?.value||"");
  const melds=parseMelds(document.getElementById("fd-meld-"+w)?.value||"");
  if(!init.length&&!finalH.length)return null;

  // 副露の牌のうち「自分でツモった牌」= ankan全部 + pon/chi/kanのnakiIdx以外
  // 「他家からもらった牌」= pon/chi/kanのnakiIdx位置の牌1枚
  // ツモ計算では他家からもらった牌は除外する
  const meldOwnTiles=[];// 自分の手牌から出た牌
  melds.forEach(function(m){
    if(m.type==="ankan"||m.isAnkan){
      // 暗カン: 4枚とも自分のツモ
      (m.tiles||[]).forEach(function(t){meldOwnTiles.push(t);});
    } else {
      // pon/chi/kan: 鳴いた1枚(nakiIdx)は他家から、残りは自分の手から
      const nakiIdx=m.nakiIdxFixed!==null?m.nakiIdxFixed:0;
      (m.tiles||[]).forEach(function(t,ti){
        if(ti!==nakiIdx)meldOwnTiles.push(t);
      });
    }
  });

  // 手元にあった牌の総数 = 最終手牌 + 捨て牌 + 副露自己牌
  const used=finalH.concat(disc).concat(meldOwnTiles);

  // used - init = ツモ牌（multiset差分）
  const initCount={};
  init.forEach(function(t){initCount[normalTile(t)]=(initCount[normalTile(t)]||0)+1;});
  const remain=[];
  used.forEach(function(t){
    const n=normalTile(t);
    if(initCount[n]>0){initCount[n]--;} else {remain.push(t);}
  });

  // ツモ牌の枚数は捨て牌枚数 + カン回数（嶺上ツモ分）とほぼ一致するはず
  // 正確な順番は不明なので remain をソートして返す（不明な分は?で補う）
  const kanCount=melds.filter(function(m){return m.type==="kan"||m.type==="ankan"||m.isAnkan;}).length;
  const expectedCount=disc.length+kanCount;
  const tsumo=sortTiles(remain);

  // 枚数が合わない分は?で補う
  while(tsumo.length<expectedCount)tsumo.push("?");
  return tsumo.slice(0,Math.max(tsumo.length,expectedCount));
}

}

function insertText(text){
  if(!kbdTarget)return;
  const ta=document.getElementById(kbdTarget.taId);
  if(!ta)return;
  const pos=ta.selectionStart,val=ta.value;
  const needSp=pos>0&&val[pos-1]!==" ";
  const ins=(needSp?" ":"")+text;
  ta.value=val.slice(0,pos)+ins+val.slice(pos);
  ta.selectionStart=ta.selectionEnd=pos+ins.length;
  ta.dispatchEvent(new Event("input"));
  ta.focus();
}

// ─── 牌譜生成 ───
function buildFromText(){
  const winner=document.getElementById("res-winner").value;
  const wintype=winner==="ryukyoku"?"ryukyoku":document.getElementById("res-wintype")?.value||"tsumo";
  const loser=wintype==="ron"?(document.getElementById("res-loser")?.value||""):"";
  const resultScore=(document.getElementById("res-score")?.value||"").trim();
  const mi={
    title:document.getElementById("m-title").value.trim(),
    bk:document.getElementById("m-bk").value,
    ky:document.getElementById("m-ky").value,
    ho:document.getElementById("m-ho").value,
    dora:document.getElementById("m-dora").value.trim()
  };

  const discards={},finalHands={},melds={},tsumos={},riichiIdxMap={};
  WE.forEach(function(w){
    discards[w]=parseTiles(document.getElementById("fd-disc-"+w)?.value||"");
    finalHands[w]=sortTiles(parseTiles(document.getElementById("fd-hand-"+w)?.value||""));
    melds[w]=parseMelds(document.getElementById("fd-meld-"+w)?.value||"");
    tsumos[w]=parseTiles(document.getElementById("fd-tsumo-"+w)?.value||"");
    // ツモ牌は手動入力のみ（自動推測なし）
    var _rv=document.getElementById('fd-riichi-'+w);if(_rv){var _rv2=parseInt(_rv.value);riichiIdxMap[w]=(isNaN(_rv2)?-1:_rv2);}else{riichiIdxMap[w]=-1;}
  });
  if(WE.every(function(w){return !discards[w].length&&!finalHands[w].length;})){
    setSt("少なくとも1プレイヤーのデータを入力してください","err","st-text");return;
  }

  const rt=winner==="ryukyoku"?"ryukyoku":wintype;
  const doraVal=parseTiles(mi.dora);
  const uraDoraVal=parseTiles((document.getElementById("m-ura-dora")?.value||"").trim());
  const playerScores={};
  var _pm=document.getElementById('chk-point-mode')?.checked;
  WE.forEach(function(w){
    var sv=document.getElementById("sc-start-"+w)?.value;
    var ev=document.getElementById("sc-end-"+w)?.value;
    var s=sv?parseFloat(sv):null;
    var e=ev?parseFloat(ev):null;
    // ポイントモードなら100倍して点数に変換
    if(_pm){if(s!=null)s=Math.round(s*100);if(e!=null)e=Math.round(e*100);}
    playerScores[w]={start:s,end:e,pointMode:_pm?true:false};
  });

  // 流局テンパイ自動判定: 終了点数が開始点数より大きいプレイヤー
  const tenpaiFlags={};
  if(winner==="ryukyoku"){
    WE.forEach(function(w){
      const sc=playerScores[w];
      if(sc&&sc.start!=null&&sc.end!=null){
        tenpaiFlags[w]=sc.end>sc.start?true:false;
      } else {
        tenpaiFlags[w]=null; // 不明
      }
    });
  }
  gameData={
    meta:{
      title:mi.title,bakaze:mi.bk,kyoku:parseInt(mi.ky),honba:parseInt(mi.ho),
      dora_indicators:doraVal.length?doraVal:null,
      dora_indicator:doraVal.length?doraVal[0]:null,
      ura_dora_indicators:uraDoraVal.length?uraDoraVal:null,
      result_type:rt,
      winner:winner==="ryukyoku"?null:winner,
      loser:loser||null,
      yaku:[],han:0,fu:0,
      score:resultScore,
      confidence:"high",ai_notes:"",
      tenpai:tenpaiFlags
    },
    players:{},discards,initHands,playerScores
  };
  WE.forEach(function(w){
    gameData.players[w]={hand:finalHands[w],melds:melds[w],tsumo:tsumos[w],riichiIdx:riichiIdxMap[w]};
  });

  steps=buildSteps(gameData);
  document.getElementById("step-slider").max=steps.length-1;
  tsumoVisible={east:false,south:false,west:false,north:false};
  showPhase("ph-player");
  renderPlayer();
  window.scrollTo({top:0,behavior:"smooth"});
}

// ─── 牌譜ステップ ───
function buildSteps(gd){
  const result=[];
  const allDisc=gd.discards||{};
  const allMelds=gd.players||{};

  // 副露ごとに「どの捨て牌が鳴かれたか」を特定する
  // nakiInfo[wind] = [ {discWind, discIdx, meldIdx}, ... ] 鳴かれた捨て牌の情報
  // 推定ロジック: pon/chiのdiscTileが他家の捨て牌に含まれる最後のインデックスを使う
  // 捨て牌の消費ペースを考慮して「自分より前のターン」の捨て牌から探す

  // まず全副露を捨て牌との対応付けに整理
  // meldEvents[i] = { wind, meld, discWind, discIdx, stepAfter }
  // stepAfterは「この副露が現れる最初のステップインデックス（これより後に表示）」
  const meldEvents=[];

  WE.forEach(function(nakiWind){
    const melds=allMelds[nakiWind]?.melds||[];
    melds.forEach(function(meld,mi){
      if(meld.type==="ankan"||meld.isAnkan){
        // 暗カン: 捨て牌との対応なし。表示タイミングは最後
        meldEvents.push({nakiWind,meld,discWind:null,discIdx:-1,meldRank:1000+mi});
        return;
      }
      if(!meld.discTile){
        // discTile未設定: 最後に表示
        meldEvents.push({nakiWind,meld,discWind:null,discIdx:-1,meldRank:2000+mi});
        return;
      }
      // pon/chi/kan: nakiIdxFixed から鳴き元の風を確定する
      // nakiIdxFixed: 0=上家, 1=対面, 2=下家 (pon/kanの場合)
      // チーは必ず上家からのみ可能
      const nakiWindIdx=WE.indexOf(nakiWind);
      let targetDiscWind=null;
      if(meld.type==='chi'){
        // チーは必ず上家から
        targetDiscWind=WE[(nakiWindIdx-1+4)%4];
      } else if(meld.nakiIdxFixed!==null){
        // pon/kan: nakiIdxFixed が 0=上家,1=対面,2=下家
        if(meld.nakiIdxFixed===0)      targetDiscWind=WE[(nakiWindIdx-1+4)%4]; // 上家
        else if(meld.nakiIdxFixed===1) targetDiscWind=WE[(nakiWindIdx+2)%4];   // 対面
        else if(meld.nakiIdxFixed===2) targetDiscWind=WE[(nakiWindIdx+1)%4];   // 下家
      }

      // 鳴いた牌（tiles[nakiIdxFixed] の牌）
      const nakiTile=(meld.tiles||[])[meld.nakiIdxFixed!==null?meld.nakiIdxFixed:0];

      // 副露後の自家捨て牌インデックス（順目の手がかり）
      let afterDiscIdx=-1;
      if(meld.discTile){
        const ownDisc=allDisc[nakiWind]||[];
        for(let i=0;i<ownDisc.length;i++){
          if(ownDisc[i]===meld.discTile){afterDiscIdx=i;break;}
        }
      }

      let bestWind=null,bestIdx=-1;
      if(targetDiscWind){
        // 鳴き元が確定している場合: その風の捨て牌から探す
        const dl=allDisc[targetDiscWind]||[];
        const searchLimit=afterDiscIdx>=0?Math.min(afterDiscIdx+3,dl.length):dl.length;
        for(let i=searchLimit-1;i>=0;i--){
          if(dl[i]===nakiTile){bestWind=targetDiscWind;bestIdx=i;break;}
        }
        // 見つからない場合は全範囲で再探索
        if(bestIdx<0){
          for(let i=dl.length-1;i>=0;i--){
            if(dl[i]===nakiTile){bestWind=targetDiscWind;bestIdx=i;break;}
          }
        }
      } else {
        // 鳴き元が不明の場合: 全他家から探す（フォールバック）
        WE.forEach(function(dw){
          if(dw===nakiWind)return;
          const dl=allDisc[dw]||[];
          const searchLimit=afterDiscIdx>=0?Math.min(afterDiscIdx+3,dl.length):dl.length;
          for(let i=searchLimit-1;i>=0;i--){
            if(dl[i]===nakiTile&&i<(bestIdx<0?Infinity:bestIdx)){
              bestWind=dw;bestIdx=i;break;
            }
          }
        });
      }
      meldEvents.push({nakiWind,meld,discWind:bestWind,discIdx:bestIdx,
        afterDiscWind:nakiWind,afterDiscIdx:afterDiscIdx,
        meldRank:bestIdx>=0?bestIdx:5000+mi});
    });
  });

  // meldEventsを鳴きのタイミング順にソート
  meldEvents.sort(function(a,b){return a.meldRank-b.meldRank;});

  // 捨て牌ごとに「鳴かれたインデックスのSet」を作る: nakiSets[wind] = Set<discIdx>
  const nakiSets={};
  WE.forEach(function(w){nakiSets[w]=new Set();});
  // nakiInfo[wind][discIdx] = {type, nakiWind} - 鳴きの種類情報
  const nakiInfo={};
  WE.forEach(function(w){nakiInfo[w]={};});
  meldEvents.forEach(function(ev){
    // 鳴かれた牌（他家の捨て牌）にマーク
    if(ev.discWind&&ev.discIdx>=0){
      nakiSets[ev.discWind].add(ev.discIdx);
      nakiInfo[ev.discWind][ev.discIdx]={type:ev.meld.type,nakiWind:ev.nakiWind,role:'naki'};
    }
    // 副露後に自分が捨てた牌にもマーク
    if(ev.afterDiscWind&&ev.afterDiscIdx>=0){
      nakiSets[ev.afterDiscWind].add(ev.afterDiscIdx);
      // 嶺上牌(rinshan)情報を付与
      nakiInfo[ev.afterDiscWind][ev.afterDiscIdx]={type:ev.meld.type,nakiWind:ev.nakiWind,role:'after',rinshan:ev.meld.rinshanTile||null};
    }
  });

  // 各ステップで表示すべき副露を段階的に積み上げる
  // 捨て牌のステップ数カウント: 各windの捨て牌がdiscIdx枚まで出た時点でその副露を表示
  const empty={east:[],south:[],west:[],north:[]};
  // 配牌時の手牌（初期手牌そのまま）
  const initCH={};
  WE.forEach(function(w){initCH[w]=sortTiles(gd.initHands[w]||[]);});
  result.push({type:"init",desc:gd.meta.bakaze+"風"+gd.meta.kyoku+"局 配牌",
    discards:dc(empty),active:null,hlWind:null,hlTile:null,
    visibleMelds:{east:[],south:[],west:[],north:[]},nakiSets:nakiSets,nakiInfo:nakiInfo,currentHands:initCH});

  const maxD=Math.max(0,...WE.map(function(w){return(allDisc[w]||[]).length;}));
  const ds={east:[],south:[],west:[],north:[]};
  // 表示済み副露を追跡
  const shownMeldFlags=meldEvents.map(function(){return false;});

  for(let i=0;i<maxD;i++){
    for(const wind of WE){
      const dl=allDisc[wind]||[];
      if(i>=dl.length)continue;
      const d=dl[i];
      ds[wind]=[...ds[wind],d];

      // 副露の表示タイミング:
      // 「鳴かれた側の捨て牌ステップ」で立てる（既存）
      // これにより、鳴いた牌が相手の捨て牌に表示された後に副露パネルが出る
      shownMeldFlags.forEach(function(_,ei){
        const ev=meldEvents[ei];
        if(!shownMeldFlags[ei]&&ev.discWind===wind&&ev.discIdx===i){
          shownMeldFlags[ei]=true;
        }
        // afterDiscIdx のステップでも念のため確認
        if(!shownMeldFlags[ei]&&ev.afterDiscWind===wind&&ev.afterDiscIdx===i&&ev.afterDiscIdx>=0){
          shownMeldFlags[ei]=true;
        }
      });

      // 表示すべきvisibleMeldsを構築
      const vm={east:[],south:[],west:[],north:[]};
      shownMeldFlags.forEach(function(shown,ei){
        if(shown)vm[meldEvents[ei].nakiWind].push(meldEvents[ei].meld);
      });

      // 各プレイヤーの現在手牌を計算
      const cHands={};
      WE.forEach(function(cw){
        const cInit=gd.initHands[cw]||[];
        const cTsumo=gd.players[cw]?.tsumo||[];
        const cDisc=ds[cw]||[];
        const cDiscN=cDisc.length;
        // 副露自己牌（この時点で表示中の副露）
        const cMeldOwn=[];
        vm[cw].forEach(function(mel){
          if(mel.type==="ankan"||mel.isAnkan){
            (mel.tiles||[]).forEach(function(t){cMeldOwn.push(t);});
          } else {
            const ni=mel.nakiIdxFixed!==null?mel.nakiIdxFixed:0;
            (mel.tiles||[]).forEach(function(t,ti){if(ti!==ni)cMeldOwn.push(t);});
          }
        });
        // 正確な手牌計算:
        // hand = init + ツモ牌(discCount枚分) - 捨て牌 - 副露自己牌
        // ツモ牌は tsumoArr の最初の cDiscN 個（↓はツモ切り=その前ツモ牌をそのまま捨て）
        // ↓はtsumoArrに含まれないので cDiscN 個取ればOK
        // ただし↓が含まれている場合は1枚として数える（tsumoArr自体に↓は入っていない場合が多い）
        const tsumoSlice=cTsumo.slice(0,cDiscN);
        const bag={};
        cInit.forEach(function(t){const n=normalTile(t);bag[n]=(bag[n]||0)+1;});
        tsumoSlice.forEach(function(t){if(t&&t!=="?"&&t!=="↓"){const n=normalTile(t);bag[n]=(bag[n]||0)+1;}});
        cDisc.forEach(function(t){const n=normalTile(t);if(bag[n]>0)bag[n]--;});
        cMeldOwn.forEach(function(t){const n=normalTile(t);if(bag[n]>0)bag[n]--;});
        // bagをtile配列に戻す（元のtile形式を保持）
        const handArr=[];
        const allSrc=cInit.concat(tsumoSlice.filter(function(t){return t&&t!=="?"&&t!=="↓";}));
        const usedBag={};
        allSrc.forEach(function(t){
          const n=normalTile(t);
          if(!usedBag[n])usedBag[n]=0;
          if(usedBag[n]<(bag[n]||0)){usedBag[n]++;handArr.push(t);}
        });
        cHands[cw]=sortTiles(handArr);
      });
      result.push({type:"dahai",desc:WJ[wind]+"家 "+te(d)+" を打牌",
        discards:dc(ds),active:wind,hlWind:wind,hlTile:d,
        visibleMelds:vm,nakiSets:nakiSets,nakiInfo:nakiInfo,currentHands:cHands});
    }
  }

  // 最終ステップは全副露を表示
  const vmAll={east:[],south:[],west:[],north:[]};
  meldEvents.forEach(function(ev){vmAll[ev.nakiWind].push(ev.meld);});

  const rt=gd.meta?.result_type;
  const finalCH={};
  WE.forEach(function(w){finalCH[w]=sortTiles(gd.players[w]?.hand||[]);});
  if(rt==="ryukyoku"||!rt){
    result.push({type:"ryukyoku",desc:"流局",discards:dc(ds),active:null,hlWind:null,hlTile:null,
      visibleMelds:vmAll,nakiSets:nakiSets,nakiInfo:nakiInfo,currentHands:finalCH});
  } else {
    const w=gd.meta.winner;
    const sc=gd.players[w]?.score||gd.meta.score||"";
    const loser=gd.meta.loser;
    result.push({type:"agari",
      desc:WJ[w]+"家 "+(rt==="tsumo"?"ツモ":"ロン（"+WJ[loser]+"家から）")+"和了"+(sc?" "+sc+"点":""),
      discards:dc(ds),active:w,winner:w,loser:loser,hlWind:null,hlTile:null,
      visibleMelds:vmAll,nakiSets:nakiSets,nakiInfo:nakiInfo,currentHands:finalCH});
  }
  return result;
}

function buildFloatYamaHTML(stepIdx){
  var rem=calcRemainingTiles(stepIdx);
  // 色設定: 0=黒, 1=橙, 2=黄, 3=薄緑, 4=透明
  var COLORS=["#333","#ce93d8","#fff176","#c8e6c9","#43a047"];
  var TCOLORS=["#fff","#333","#333","#333","#fff"];
  var BORDER=["none","none","none","none","none"];
  var suits=[
    {label:"萬",tiles:["1m","2m","3m","4m","5m","6m","7m","8m","9m"]},
    {label:"筒",tiles:["1p","2p","3p","4p","5p","6p","7p","8p","9p"]},
    {label:"索",tiles:["1s","2s","3s","4s","5s","6s","7s","8s","9s"]},
    {label:"字",tiles:["東","南","西","北","白","発","中"]},
  ];
  // 正確な総残り枚数
  var correctTotal=Object.values(rem).reduce(function(a,b){return a+b;},0);
  if(stepIdx!==undefined&&steps&&steps[stepIdx]){
    var s2=steps[stepIdx];
    var totalDiscs=WE.reduce(function(acc,w){return acc+(s2.discards[w]||[]).length;},0);
    var nakiCount=0,kanCount=0;
    WE.forEach(function(w){
      var vm=s2.visibleMelds?s2.visibleMelds[w]:[];
      (vm||[]).forEach(function(m){
        if(m.type!=="ankan"&&!m.isAnkan)nakiCount++;
        if(m.type==="kan"||m.type==="ankan"||m.isAnkan)kanCount++;
      });
    });
    // カンはツモ山末尾→王牌補充のためネット0。ポン/チーのみ引く
    correctTotal=84-(totalDiscs-nakiCount);
    if(correctTotal<14&&steps[stepIdx]&&steps[stepIdx].type!=="agari")correctTotal=14;
    if(correctTotal<0)correctTotal=0;
  }
  var html='<div style="font-size:10px;">';
  // 残り枚数合計
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">';
  html+='<div style="display:flex;gap:5px;">';
  [0,1,2,3,4].forEach(function(n){
    html+='<span style="display:inline-flex;align-items:center;gap:2px;">'
      +'<span style="width:10px;height:10px;background:'+COLORS[n]+';border:'+BORDER[n]+';border-radius:2px;display:inline-block;"></span>'
      +'<span style="color:var(--tx3);font-size:9px;">'+n+'</span></span>';
  });
  html+='</div>';
  html+='<span style="color:var(--tx3);font-size:10px;">残 <b style="color:var(--tx);font-size:12px;">'+correctTotal+'</b> 枚</span>';
  html+='</div>';
  // 牌グリッド（コンパクト: 絵文字なし、数字のみ）
  suits.forEach(function(suit){
    html+='<div style="display:flex;align-items:center;gap:2px;margin-bottom:3px;">';
    html+='<span style="font-size:9px;color:var(--tx3);width:12px;flex-shrink:0;text-align:center;">'+suit.label+'</span>';

// ─── 山残り牌計算 ───
function calcRemainingTiles(stepIdx){
  // 残り牌 = 136 - 配牌(52) - ツモ数
  // ツモ数 = ステップ時点の全捨て牌数 + 副露カン数 (嶺上ツモ) 
  // ただし鳴いた枚数分はツモではないので引く
  // ステップベースの残り枚数計算: 捨て牌の実牌種別に基づいて残り枚数を集計
  const used={};
  const currentStep=stepIdx!==undefined&&steps&&steps[stepIdx]?steps[stepIdx]:null;
  
  WE.forEach(function(w){
    const init=gameData.initHands[w]||[];
    // 初期手牌
    init.forEach(function(t){const n=normalTile(t);used[n]=(used[n]||0)+1;});
    
    // ツモ牌: ステップ指定時はそのステップの捨て牌数分のみカウント
    const tsumo=gameData.players[w]?.tsumo||[];
    var useTsumoCount=tsumo.length;
    if(currentStep){
      var discAtStep=(currentStep.discards[w]||[]).length;
      useTsumoCount=Math.min(tsumo.length,discAtStep);
    }
    tsumo.slice(0,useTsumoCount).forEach(function(t){
      if(t&&t!=="?"){const n=normalTile(t);used[n]=(used[n]||0)+1;}
    });
    
    // 副露で受け取った他家牌 (ステップ指定時はそのステップで表示中の副露のみ)
    const melds=currentStep
      ?(currentStep.visibleMelds?currentStep.visibleMelds[w]:[])
      :(gameData.players[w]?.melds||[]);
    melds.forEach(function(m){
      if(m.type==="ankan"||m.isAnkan)return;
      const nakiIdx=m.nakiIdxFixed!==null?m.nakiIdxFixed:0;
      const t=(m.tiles||[])[nakiIdx];
      if(t){const n=normalTile(t);used[n]=(used[n]||0)+1;}
    });
  });
  // 各牌の残り枚数
  const ALL_TILES=[];
  for(let n=1;n<=9;n++)ALL_TILES.push(n+"m");
  for(let n=1;n<=9;n++)ALL_TILES.push(n+"p");
  for(let n=1;n<=9;n++)ALL_TILES.push(n+"s");
  ["東","南","西","北","白","発","中"].forEach(function(t){ALL_TILES.push(t);});
  const remaining={};
  ALL_TILES.forEach(function(t){remaining[t]=Math.max(0,4-(used[t]||0));});
  return remaining;
}

function buildYamaHTML(forPrint,stepIdx){
  const rem=calcRemainingTiles(stepIdx);
  // 色: 0=濃赤, 1=橙, 2=黄, 3=薄緑, 4=無色
  const COLORS=["#222","#ce93d8","#fff176","#c8e6c9","#43a047"];
  const TCOLORS=["#fff","#333","#333","#333","#fff"];
  const suits=[
    {label:"萬",tiles:["1m","2m","3m","4m","5m","6m","7m","8m","9m"]},
    {label:"筒",tiles:["1p","2p","3p","4p","5p","6p","7p","8p","9p"]},
    {label:"索",tiles:["1s","2s","3s","4s","5s","6s","7s","8s","9s"]},
    {label:"字",tiles:["東","南","西","北","白","発","中"]},
  ];
  const fs=forPrint?"9px":"11px";
  const cellW=forPrint?"18px":"26px";
  const cellH=forPrint?"16px":"24px";
  let html='<div style="font-size:'+fs+';">';
  // 凡例
  html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;">';
  [0,1,2,3,4].forEach(function(n){
    html+='<span style="display:inline-flex;align-items:center;gap:3px;">'
      +'<span style="width:14px;height:14px;background:'+COLORS[n]+';border-radius:2px;display:inline-block;"></span>'
      +'<span style="color:var(--tx3);font-size:10px;">'+n+'枚</span></span>';
  });
  // 正確な総残り枚数を計算: 136 - 配牌52枚 - ステップ時点のツモ数
  var correctTotal=Object.values(rem).reduce(function(a,b){return a+b;},0);
  if(stepIdx!==undefined&&steps&&steps[stepIdx]){
    var s2=steps[stepIdx];
    var totalDiscs=WE.reduce(function(acc,w){return acc+(s2.discards[w]||[]).length;},0);
    var nakiCount=0,kanCount=0;
    WE.forEach(function(w){
      var vm=s2.visibleMelds?s2.visibleMelds[w]:[];
      vm.forEach(function(m){
        if(m.type!=="ankan"&&!m.isAnkan)nakiCount++;
        if(m.type==="kan"||m.type==="ankan"||m.isAnkan)kanCount++;
      });
    });
    // 実際のツモ数 = 捨て牌総数 - 鳴きターン数(ポン/チー/通常カン) + カン嶺上数
    // 鳴き発生時: 鳴いたプレイヤーはそのターンツモしない代わりに他家牌をもらう
    // 残り = 84 - ツモ数
    // = 84 - (totalDiscs - nakiCount + kanCount)
    // カンはツモ山末尾→王牌補充のためネット0。ポン/チーのみ引く
    var draws=totalDiscs-nakiCount;
    correctTotal=84-draws;
    if(correctTotal<14&&s2.type!=="agari")correctTotal=14; // 流局時は最低14枚(王牌)
    if(correctTotal<0)correctTotal=0;
  }
  html+='<span style="margin-left:auto;color:var(--tx3);font-size:10px;">山残り計 <b style="color:var(--tx);">'+correctTotal+'</b>枚</span>';
  html+='</div>';
  // スーツ行
  suits.forEach(function(suit){
    html+='<div style="display:flex;align-items:center;gap:3px;margin-bottom:4px;">';
    html+='<span style="font-size:10px;color:var(--tx3);width:16px;flex-shrink:0;">'+suit.label+'</span>';
    suit.tiles.forEach(function(t){
      const n=rem[t]??4;
      const emoji=te(t);
      html+='<div style="width:'+cellW+';height:'+cellH+';background:'+COLORS[n]
        +';border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;">'
        +'<span style="font-size:'+(forPrint?"11px":"13px")+';">'+emoji+'</span>'

        +'</div>';
    });
    html+='</div>';
  });
  html+='</div>';
  return html;
}

function renderYamaCard(stepIdx){
  const card=document.getElementById("yama-card");
  if(!card||!gameData)return;
  card.style.display="block";
  document.getElementById("yama-content").innerHTML=buildYamaHTML(false,stepIdx);
}

function buildReportHTML(){
  const m=gameData.meta;
  const title=m.title||(m.bakaze+"風"+m.kyoku+"局");
  var doraInds2=m.dora_indicators||(m.dora_indicator?[m.dora_indicator]:[]);
  var uraInds2=m.ura_dora_indicators||[];
  var maxDoraLen=Math.max(doraInds2.length,uraInds2.length);
  var doraLines2=[];
  for(var di=0;di<maxDoraLen;di++){
    var dind=doraInds2[di],uind=uraInds2[di];
    var row='';
    if(dind)row+=te(dind)+'→'+te(doraFromIndicator(dind));
    if(uind)row+=(row?' ':'')+'<span style="color:#555;font-size:9px;">裏</span>'+te(uind)+'→'+te(doraFromIndicator(uind));
    if(row)doraLines2.push(row);
  }
  const doraHtml=doraLines2.length?doraLines2.join(' / '):"なし";
  const memo=(document.getElementById("report-memo")?.value||"").trim();
  let resultText="流局";
  if(m.winner){
    const loserText=m.loser?"（"+WJ[m.loser]+"家から）":"";
    resultText=WJ[m.winner]+"家 "+(m.result_type==="tsumo"?"ツモ":"ロン"+loserText)+"和了"+(m.score?" "+m.score+"点":"");
  }
  // 点数情報は各プレイヤーブロック内に統合するため個別に取得
  const ps2=gameData.playerScores||{};

  // nakiInfo は buildSteps で生成されたものを使う
  // （最終ステップの nakiInfo を参照）
  var finalNakiInfo={};
  if(steps&&steps.length>0){
    var lastStep=steps[steps.length-1];
    if(lastStep.nakiInfo)finalNakiInfo=lastStep.nakiInfo;
  }

  let playersHtml=WE.map(function(w){
    const ih=gameData.initHands[w]||[];
    const fh=gameData.players[w]?.hand||[];
    const disc=gameData.discards[w]||[];
    const tsumoArr=gameData.players[w]?.tsumo||[];
    const pm=gameData.players[w]?.melds||[];
    const riichiIdx=gameData.players[w]?.riichiIdx??-1;
    const isWin=m.winner===w;
    const isLoser=m.loser===w;
    const mHtml=meldHTML(pm);
    const wNakiInfo=finalNakiInfo[w]||{};

    // セルサイズ: 印刷時に1ページに収まるよう調整
    const FS='13px';

    // ラベル列のスタイル
    const lblStyle='font-size:9px;color:#888;font-weight:600;writing-mode:horizontal-tb;'
      +'padding-right:3px;white-space:nowrap;min-width:22px;text-align:right;'
      +'display:flex;align-items:flex-start;padding-top:0;';

    // 各牌セルHTML生成: 牌絵文字＋下部バッジ
    // 各行を「列」単位で組み立てる共通セル関数
    // 幅を固定（CELLpx）して全行の列を揃える
    // ── 列単位で組み立て：幅は絵文字の自然幅、列は縦 div で揃える ──
    // 各列 = {tsumo: html, disc: html, badge, bColor}
    // ツモ行と捨て行を同じ列 div に入れるので幅が完全に一致する

    // バッジ付きセル（列内の捨てセル用）
    function discCell(emoji, badge, bColor, isTsumoCut){
      var inner = isTsumoCut
        ? '<span style="color:#999;font-size:'+FS+';line-height:1.1;display:block;text-align:center;">↓</span>'
        : '<span style="font-size:'+FS+';line-height:1.1;display:block;">'+emoji+'</span>';
      var bdg = badge
        ? '<span style="font-size:7px;font-weight:700;color:'+bColor+';line-height:1;height:8px;display:block;text-align:center;white-space:nowrap;">'+badge+'</span>'
        : '<span style="height:8px;display:block;"></span>';
      return inner+bdg;
    }

    // ツモセル（列内のツモ行用）
    function tsumoCell(emoji, visible){
      var inner = visible
        ? '<span style="font-size:'+FS+';line-height:1.1;display:block;">'+emoji+'</span>'
        : '<span style="font-size:'+FS+';line-height:1.1;display:block;visibility:hidden;">'+emoji+'</span>';
      // バッジ行と高さを揃えるためのスペーサー
      return inner+'<span style="height:8px;display:block;"></span>';
    }

    // 列 div ラッパー
    function colDiv(tsumoHtml, discHtml){
      return '<div style="display:inline-flex;flex-direction:column;align-items:center;vertical-align:top;">'
        +'<div>'+tsumoHtml+'</div>'
        +'<div>'+discHtml+'</div>'
        +'</div>';
    }

    // 単純セル（初期・最終など単一行用）
    function singleCell(emoji){
      return '<span style="font-size:'+FS+';line-height:1.1;">'+emoji+'</span>';
    }

    // 初期行（単純横並び）
    var initCells = ih.map(function(t){ return singleCell(te(t)); }).join('');

    // ツモ+捨て：列ごとに組み立て
    var tsumoCount = 0;
    var tsumoDiscCols = '';

    disc.forEach(function(d, i){
      var t = tsumoArr[i] || null;
      // ツモ切り判定: ツモ牌と捨て牌が同じ牌（自動検出）
      // ↓は入力されなくなったので完全に自動判定
      var isTsumoCut = (t && t !== '?' && normalTile(t) === normalTile(d));

      // バッジ判定
      var nkInfo = wNakiInfo[i] || null;
      var badge = ''; var bColor = '';
      if(i === riichiIdx){ badge = 'R'; bColor = '#c0392b'; }
      else if(nkInfo){
        if(nkInfo.role === 'naki'){
          badge = nkInfo.type==='pon'?'P':nkInfo.type==='chi'?'C':'K';
          bColor = nkInfo.type==='pon'?'#c0392b':nkInfo.type==='chi'?'#0f6e56':'#d35400';
        } else if(nkInfo.role === 'after'){
          badge = nkInfo.type==='pon'?'P↓':nkInfo.type==='chi'?'C↓':'K↓';
          bColor = nkInfo.type==='pon'?'#c0392b':nkInfo.type==='chi'?'#0f6e56':'#d35400';
        }
      }

      // 嶺上牌列（捨て行に ^ 付き牌、ツモ行は invisible で幅確保）
      if(nkInfo && nkInfo.rinshan){
        var rinshanEmoji = '<span style="position:relative;display:inline-block;">'
          +te(nkInfo.rinshan)
          +'<span style="position:absolute;top:-2px;left:50%;transform:translateX(-50%);font-size:7px;font-weight:700;color:#0f6e56;line-height:1;">^</span>'
          +'</span>';
        tsumoDiscCols += colDiv(
          tsumoCell(te(nkInfo.rinshan), false),
          discCell(rinshanEmoji, '', '', false)
        );
      }

      // ツモセル
      var tH;
      if(isTsumoCut){
        // ツモ切り: ツモ牌をそのまま薄く表示（視覚的に「即捨て」を示す）
        tH = '<span style="font-size:'+FS+';line-height:1.1;display:block;opacity:.35;">'+te(t)+'</span>'
           + '<span style="height:8px;display:block;"></span>';
        tsumoCount++;
      } else if(t && t !== '?'){
        tH = tsumoCell(te(t), true);
        tsumoCount++;
      } else {
        // tsumoArr に対応するツモ牌がない（入力なし）→ 空セル
        tH = '<span style="font-size:'+FS+';line-height:1.1;display:block;visibility:hidden;">•</span>'
           + '<span style="height:8px;display:block;"></span>';
      }

      // 捨てセル
      var dH = discCell(te(d), badge, bColor, isTsumoCut);

      tsumoDiscCols += colDiv(tH, dH);
    });

    // 末尾ツモ未捨て分
    for(var ti2 = disc.length; ti2 < tsumoArr.length; ti2++){
      var t2 = tsumoArr[ti2];
      if(t2 && t2 !== '↓' && t2 !== '?'){
        tsumoDiscCols += colDiv(
          tsumoCell(te(t2), true),
          discCell('<span style="visibility:hidden;">'+te(t2)+'</span>', '', '', false)
        );
        tsumoCount++;
      }
    }

    // 最終手牌行（単純横並び）
    var finalCells = fh.map(function(t){ return singleCell(te(t)); }).join('');


    // 行を組み立てる関数
    function rowHtml(label, cells, countSuffix){
      return '<div style="display:flex;align-items:flex-start;margin-bottom:1px;">'
        +'<div style="'+lblStyle+'">'+label+'</div>'
        +'<div style="display:inline-flex;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;flex:1;'
        +'align-items:flex-start;white-space:nowrap;letter-spacing:0;word-spacing:0;font-size:0;">'+cells
        +(countSuffix?'<span style="font-size:8px;color:#aaa;white-space:nowrap;line-height:1;padding-left:3px;align-self:flex-start;padding-top:1px;">'+countSuffix+'</span>':'')
        +'</div></div>';
    }
    // ツモ+捨て 2行まとめて表示する関数
    function tsumoDiscRow(label1, label2, cols, tsumoSuffix, discSuffix){
      return '<div style="display:flex;align-items:flex-start;margin-bottom:1px;">'
        +'<div style="display:flex;flex-direction:column;'+lblStyle+';">'
          +'<span>'+label1+'</span>'
          +'<span>'+label2+'</span>'
        +'</div>'
        +'<div style="display:inline-flex;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;flex:1;'
        +'align-items:flex-start;white-space:nowrap;letter-spacing:0;word-spacing:0;font-size:0;">'
        +cols
        +(tsumoSuffix||discSuffix
          ?'<div style="display:inline-flex;flex-direction:column;align-self:flex-start;padding-left:3px;">'
            +(tsumoSuffix?'<span style="font-size:8px;color:#aaa;white-space:nowrap;">'+tsumoSuffix+'</span>':'<span style="height:8px;display:block;"></span>')
            +(discSuffix?'<span style="font-size:8px;color:#aaa;white-space:nowrap;">'+discSuffix+'</span>':'<span style="height:8px;display:block;"></span>')
            +'</div>'
          :'')
        +'</div></div>';
    }

    var tenpaiFlag=m.result_type==='ryukyoku'&&gameData.meta.tenpai?gameData.meta.tenpai[w]:null;
    var tenpaiStr=tenpaiFlag===true?' <span style="font-size:10px;padding:1px 6px;border-radius:10px;background:#eaf3de;color:#3b6d11;">テンパイ</span>'
      :tenpaiFlag===false?' <span style="font-size:10px;padding:1px 6px;border-radius:10px;background:#f1f1f1;color:#888;">ノーテン</span>'
      :'';

    var sc2=ps2[w]||{};
    var diff2=(sc2.start!=null&&sc2.end!=null)?(sc2.end-sc2.start):null;
    var diff2Str=diff2!==null?(diff2>=0?'+'+diff2.toLocaleString():''+diff2.toLocaleString()):'';
    var diff2Color=diff2===null?'#888':diff2>0?'#3b6d11':diff2<0?'#a32d2d':'#888';
    var scoreCell=(sc2.start||sc2.end)
      ?'<div style="text-align:right;font-size:9px;color:#888;line-height:1.5;flex-shrink:0;margin-left:6px;">'
       +(sc2.start?'<div>'+sc2.start.toLocaleString()+'</div>':'')
       +(sc2.end?'<div style="font-weight:700;color:#333;">'+sc2.end.toLocaleString()+'</div>':'')
       +(diff2Str?'<div style="color:'+diff2Color+';font-weight:700;">'+diff2Str+'</div>':'')
       +'</div>'
      :'';
    return '<div style="border:1px solid #ccc;border-radius:4px;padding:3px 6px;margin-bottom:3px;'
      +'background:'+(isWin?"#eaf3de":isLoser?"#fcebeb":"#fff")+';page-break-inside:avoid;">'
      +'<div style="display:flex;align-items:center;margin-bottom:1px;">'
      +'<div style="font-size:11px;font-weight:600;flex:1;">'+te(WJ[w])+' '+WJ[w]+'家'
      +(isWin?" 🏆":"")+(isLoser?" ⚡放銃":"")+tenpaiStr+'</div>'
      +scoreCell+'</div>'
      +rowHtml('初期', initCells, '')
      +(tsumoArr.length&&disc.length
        ?tsumoDiscRow('ツモ','捨て',tsumoDiscCols,
            '（'+tsumoCount+'枚）','（'+disc.length+'枚）')
        :tsumoArr.length
        ?rowHtml('ツモ',tsumoDiscCols,'（'+tsumoCount+'枚）')
        :rowHtml('捨て',tsumoDiscCols,'（'+disc.length+'枚）')
      )
      +rowHtml('最終', finalCells, '')
      +(pm.length?'<div style="margin-top:2px;display:flex;align-items:center;gap:4px;"><span style="font-size:9px;color:#888;font-weight:600;min-width:20px;text-align:right;">副露</span><div style="font-size:13px;">'+mHtml+'</div></div>':"")
      +'</div>';
  }).join("");
  const memoHtml=memo
    ?'<div style="border:1px solid #ddd;border-radius:5px;padding:4px 8px;margin-bottom:5px;background:#fffdf5;page-break-inside:avoid;">'
     +'<div style="font-size:9px;color:#888;margin-bottom:2px;">メモ</div>'
     +'<div style="font-size:11px;white-space:pre-wrap;line-height:1.5;">'+memo.replace(/</g,"&lt;")+'</div>'
     +'</div>'
    :'';
  const yamaHtml='<div style="border:1px solid #ddd;border-radius:5px;padding:5px 8px;margin-top:5px;background:#fafafa;page-break-inside:avoid;">'
    +'<div style="font-size:9px;color:#888;margin-bottom:3px;font-weight:600;">山残り牌</div>'
    +buildYamaHTML(true,steps.length-1).replace(/var\(--tx3\)/g,"#999").replace(/var\(--tx\)/g,"#1a1a18")
    +'</div>';
  return '<div id="report-inner" style="background:#fff;color:#1a1a18;padding:10px 14px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:720px;margin:0 auto;">'
    +'<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:3px;">'
    +'<h2 style="font-size:13px;margin:0;color:#555;">🀄︎ 麻雀牌譜レポート</h2>'
    +'<span style="font-size:10px;color:#aaa;">'+new Date().toLocaleString("ja-JP")+'</span>'
    +'</div>'
    +'<div style="font-size:16px;font-weight:700;margin-bottom:5px;">'+title+'</div>'
    +'<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px;font-size:11px;padding:5px 8px;background:#f5f5f3;border-radius:5px;">'
    +'<span><span style="color:#888;">場風</span> <b>'+m.bakaze+'</b></span>'
    +'<span><span style="color:#888;">局</span> <b>'+m.kyoku+'局</b></span>'
    +'<span><span style="color:#888;">本場</span> <b>'+m.honba+'本場</b></span>'
    +'<span><span style="color:#888;">ドラ</span> <b>'+doraHtml+'</b></span>'
    +'<span><span style="color:#888;">結果</span> <b>'+resultText+'</b></span>'
    +'</div>'
    +memoHtml
    +playersHtml
    +yamaHtml
    +'</div>';
}

function generateReport(){
  const area=document.getElementById("report-area");
  const prev=document.getElementById("report-preview");
  area.style.display="block";
  prev.innerHTML='<div style="text-align:center;padding:20px;color:var(--tx3);">生成中...</div>';
  area.scrollIntoView({behavior:"smooth",block:"start"});
  try{
    prev.innerHTML=buildReportHTML();
  }catch(e){
    prev.innerHTML='<div style="color:var(--r);padding:12px;">レポート生成エラー: '+e.message+'</div>';
    console.error(e);
  }
}

function downloadReport(){
  // report-innerが表示されていなければ先に生成
  if(!document.getElementById("report-inner")){
    generateReport();
    setTimeout(downloadReport, 200);
    return;
  }
  // 印刷用の隠しフレームを作成（classで管理し、inline styleでdisplay:noneを使わない）
  let frame=document.getElementById("print-frame");
  if(frame)frame.remove();
  frame=document.createElement("div");
  frame.id="print-frame";
  // @media print で display:block!important が効くように、通常時はCSSクラスで非表示
  frame.style.cssText="position:fixed;inset:0;background:#fff;z-index:9999;padding:20px;overflow:auto;";
  frame.innerHTML=document.getElementById("report-inner").outerHTML;
  document.body.appendChild(frame);

  // iOSのSafariは印刷ダイアログが出るのでその旨案内
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  if(isIOS){
    alert("印刷ダイアログが開きます。「PDFに保存」を選んでください。");
  }
  window.print();
  // 印刷後にフレームを削除
  setTimeout(function(){
    const f=document.getElementById("print-frame");
    if(f)f.remove();
  },1500);
}

// ─── localStorage 保存・復元 ───
const LS_KEY="mahjong_saved_game";

function saveToLocalStorage(){
  if(!gameData)return;
  const save={gameData,steps,savedAt:new Date().toLocaleString("ja-JP")};
  localStorage.setItem(LS_KEY,JSON.stringify(save));
  alert("保存しました（"+save.savedAt+"）");
}

function loadFromLocalStorage(){
  const raw=localStorage.getItem(LS_KEY);
  if(!raw)return false;
  try{
    const save=JSON.parse(raw);
    gameData=save.gameData;
    steps=save.steps||buildSteps(gameData);
    document.getElementById("step-slider").max=steps.length-1;
    showPhase("ph-player");
    renderPlayer();
    window.scrollTo({top:0,behavior:"smooth"});
    return save.savedAt||true;
  }catch(e){
    localStorage.removeItem(LS_KEY);return false;
  }
}

// ページ読み込み時に保存データをチェック
(function checkSavedData(){
  const raw=localStorage.getItem(LS_KEY);
  if(!raw)return;
  try{
    const save=JSON.parse(raw);
    const m=save.gameData?.meta;
    if(!m)return;
    const label=(m.title||m.bakaze+"風"+m.kyoku+"局")+" ("+save.savedAt+")";
    const banner=document.getElementById("restore-banner");
    banner.style.display="block";
    banner.innerHTML=
      '<div style="background:var(--b-bg);border-radius:var(--ral);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">'
      +'<div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;color:var(--b-t);">💾 保存済みの対局があります</div>'
      +'<div style="font-size:12px;color:var(--b-t);margin-top:2px;">'+label+'</div></div>'
      +'<button onclick="loadFromLocalStorage()" style="background:var(--b);border-color:var(--b);color:#e6f1fb;padding:7px 14px;font-size:13px;">再生する</button>'
      +'<button onclick="clearSavedData()" style="font-size:12px;color:var(--tx3);padding:5px 10px;">削除</button>'
      +'</div>';
  }catch(e){localStorage.removeItem(LS_KEY);}
})();

function clearSavedData(){
  localStorage.removeItem(LS_KEY);
  document.getElementById("restore-banner").style.display="none";
}

function stepTo(idx){cur=Math.max(0,Math.min(idx,steps.length-1));renderStep(cur);}
function stepFwd(){if(cur<steps.length-1)stepTo(cur+1);}
function stepBack(){if(cur>0)stepTo(cur-1);}
function setPlayBtns(playing){
  ["b-play","fc-play"].forEach(function(id){
    const el=document.getElementById(id);
    if(el)el.textContent=playing?"⏸ 停止":"▶ 再生";
  });
}
function togglePlay(){
  if(timer){
    clearInterval(timer);timer=null;
    setPlayBtns(false);
  } else {
    if(cur>=steps.length-1)stepTo(0);
    const ms=SPD[+document.getElementById("speed-sl").value-1];
    setPlayBtns(true);
    timer=setInterval(function(){
      if(cur>=steps.length-1){clearInterval(timer);timer=null;setPlayBtns(false);}
      else stepFwd();
    },ms);
  }
}
function setSt(msg,type,id){
  const el=document.getElementById(id);if(!el)return;
  el.className="st "+type;el.textContent=msg;
}
document.addEventListener("keydown",function(e){
  if(document.getElementById("ph-player").style.display==="none")return;
  if(e.key==="ArrowRight")stepFwd();
  if(e.key==="ArrowLeft")stepBack();
  if(e.key===" "){e.preventDefault();togglePlay();}
});
